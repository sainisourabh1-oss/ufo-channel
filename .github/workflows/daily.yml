name: Daily UFO video

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      video_id: ${{ steps.run.outputs.video_id }}
      youtube_url: ${{ steps.run.outputs.youtube_url }}
      skipped: ${{ steps.run.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ffmpeg + Hindi font
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-devanagari
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Write Google Cloud key from secret
        run: echo '${{ secrets.GCP_TTS_KEY }}' > gcp-key.json
      - name: Build today's video (uploads to YouTube as PRIVATE)
        id: run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp-key.json
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python -m pipeline.run --stage build
      - name: Save the updated dedup ledger
        if: steps.run.outputs.skipped != 'true'
        run: |
          git config user.name "ufo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add used/ledger.csv || true
          git commit -m "log video ${{ steps.run.outputs.video_id }}" || echo "nothing to commit"
          git push || echo "push skipped"

  publish:
    needs: build
    if: needs.build.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Make today's video live (scheduled for 6 PM IST)
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python -m pipeline.run --stage publish --video-id "${{ needs.build.outputs.video_id }}"
